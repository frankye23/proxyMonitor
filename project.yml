name: ProxyGlass
options:
  bundleIdPrefix: com.proxyglass
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true
  defaultConfig: Release

targets:
  ProxyGlass:
    type: application
    platform: macOS
    sources:
      - ProxyGlass
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.proxyglass.app
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        INFOPLIST_FILE: ProxyGlass/Info.plist
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: true
    entitlements:
      path: ProxyGlass/ProxyGlass.entitlements
      properties:
        com.apple.security.network.client: true
